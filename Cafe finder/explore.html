<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe Finder</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #121212;
      color: #ffffff;
    }

    .sidebar {
      width: 350px;
      background: #1e1e1e;
      border-right: 1px solid #2a2a2a;
      color: #ffffff;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #D48B4A;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-box input,
      select {
      background: #2a2a2a;
      color: #ffffff;
      flex: 1;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 8px;
    }
    .search-box input::placeholder {
     color: #aaa;
    }

    .search-box button {
      padding: 10px 14px;
      border: none;
      background: #f4c27a;
      color: #1e1e1e;
      border-radius: 8px;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #ffd59b;
    }

    .filters {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    .filters label {
      font-size: 14px;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 12px;
      background: #2a2a2a;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .card:hover {
      background: #333333;
    }

    .card h3 {
      font-size: 18px;
      margin-bottom: 6px;
      color: #F5A623;
    }

    .card p {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .card a {
      color: #2b6cb0;
      text-decoration: none;
    }

    .map-container {
      flex: 1;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .empty-state {
      font-size: 14px;
      color: #777;
      margin-top: 10px;
    }
    .status-open {
       background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
        padding: 4px 10px;
        border-radius: 12px;
       font-size: 12px;
        font-weight: 600;
       }

     .status-closed {
      background: rgba(229, 57, 53, 0.15);
      color: #e53935;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      }

    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 45%;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }
      .sidebar h1,
      .card h3 {
      color: #f4c27a;
      }

     .card p {
     color: #ddd;
      }

      .map-container {
        height: 55%;
      }
      
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>☕ Cafe Finder</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name" />
      <button onclick="geocodeCityAndMove()">Search</button>
    </div>

    <div class="filters">
      <label>
        <input type="checkbox" id="openNowFilter" />
        Open now
      </label>

      <label>
        Minimum rating:
        <select id="ratingFilter">
          <option value="0">Any</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
          <option value="4.5">4.5+</option>
        </select>
      </label>
    </div>

    <div class="results" id="results"></div>
    <p class="empty-state" id="emptyState">Search a city or allow location access to find cafes.</p>
  </div>

  <div class="map-container">
    <div id="map"></div>
  </div>

  <script>
    let map;
    let markers = [];
    let infoWindow;
    let placesService;
    let geocoder;
    let allPlaces = [];

    function initMap() {
      geocoder = new google.maps.Geocoder();
      infoWindow = new google.maps.InfoWindow();

      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 28.5383, lng: -81.3792 },
        zoom: 13,
        mapTypeControl: false
      });

      placesService = new google.maps.places.PlacesService(map);

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            map.setCenter(userLocation);
            fetchCafesNearby(userLocation);
          },
          () => {
            fetchCafesInBounds();
          }
        );
      } else {
        fetchCafesInBounds();
      }

      map.addListener("idle", () => {
        fetchCafesInBounds();
      });

      document.getElementById("openNowFilter").addEventListener("change", applyFilters);
      document.getElementById("ratingFilter").addEventListener("change", applyFilters);
    }

    function fetchCafesNearby(location) {
      const request = {
        location: location,
        radius: 3000,
        keyword: "cafe"
      };

      placesService.nearbySearch(request, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && results) {
          allPlaces = results;
          applyFilters();
        } else {
          setResults([]);
        }
      });
    }

    function fetchCafesInBounds() {
      const center = map.getCenter();
      if (!center) return;

      const request = {
        location: center,
        radius: 3000,
        keyword: "cafe"
      };

      placesService.nearbySearch(request, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && results) {
          allPlaces = results;
          applyFilters();
        } else {
          setResults([]);
        }
      });
    }

    function applyFilters() {
      const openNow = document.getElementById("openNowFilter").checked;
      const minRating = parseFloat(document.getElementById("ratingFilter").value);

      const filtered = allPlaces.filter((place) => {
        const matchesOpen =
          !openNow || place.opening_hours?.open_now === true;
        const matchesRating =
          (place.rating || 0) >= minRating;

        return matchesOpen && matchesRating;
      });

      setResults(filtered);
    }

    function setResults(places) {
      clearMarkers();

      const resultsContainer = document.getElementById("results");
      const emptyState = document.getElementById("emptyState");
      resultsContainer.innerHTML = "";

      if (!places || places.length === 0) {
        emptyState.style.display = "block";
        emptyState.textContent = "No cafes found for the selected area or filters.";
        return;
      }

      emptyState.style.display = "none";

      places.forEach((place) => {
        if (!place.geometry || !place.geometry.location) return;

        const marker = new google.maps.Marker({
          map,
          position: place.geometry.location,
          title: place.name
        });

        markers.push(marker);

        marker.addListener("click", () => {
          showPlaceDetails(place.place_id, marker);
        });

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${place.name}</h3>
          <p><strong>Rating:</strong> ${place.rating || "N/A"}</p>
          <p><strong>Address:</strong> ${place.vicinity || "Not available"}</p>
          <p>
         <strong>Status:</strong> 
         <span class="${
          place.opening_hours?.open_now ? "status-open" : "status-closed"
          }">
           ${place.opening_hours?.open_now ? "Open now" : "Closed"}
         </span>
        </p>
        `;

        card.addEventListener("click", () => {
          map.panTo(place.geometry.location);
          map.setZoom(15);
          showPlaceDetails(place.place_id, marker);
        });

        resultsContainer.appendChild(card);
      });
    }

    function showPlaceDetails(placeId, marker) {
      const request = {
        placeId: placeId,
        fields: [
          "name",
          "formatted_address",
          "rating",
          "website",
          "formatted_phone_number",
          "opening_hours",
          "photos",
          "url"
        ]
      };

      placesService.getDetails(request, (place, status) => {
        if (status !== google.maps.places.PlacesServiceStatus.OK || !place) return;

        let photoHtml = "";
        if (place.photos && place.photos.length > 0) {
          const photoUrl = place.photos[0].getUrl({ maxWidth: 250, maxHeight: 150 });
          photoHtml = `<img src="${photoUrl}" alt="${place.name}" style="width:100%;border-radius:8px;margin:8px 0;" />`;
        }

        const content = `
          <div style="max-width:250px;">
            <h3 style="margin-bottom:8px;">${place.name}</h3>
            ${photoHtml}
            <p><strong>Rating:</strong> ${place.rating || "N/A"}</p>
            <p><strong>Address:</strong> ${place.formatted_address || "N/A"}</p>
            <p><strong>Phone:</strong> ${place.formatted_phone_number || "N/A"}</p>
            <p><strong>Status:</strong> ${
              place.opening_hours?.isOpen?.() ? "Open now" : "Closed / Unknown"
             }</p>
             ${
              place.website
                ? `<p><a href="${place.website}" target="_blank">Visit website</a></p>`
                : ""
               }
               ${
              place.url
                ? `<p><a href="${place.url}" target="_blank">Open in Google Maps</a></p>`
                : ""
            }
          </div>
              `;

        infoWindow.setContent(content);
        infoWindow.open(map, marker);
      });
    }

    function geocodeCityAndMove() {
      const city = document.getElementById("cityInput").value.trim();
      if (!city) return;

      geocoder.geocode({ address: city }, (results, status) => {
        if (status === "OK" && results[0]) {
          map.setCenter(results[0].geometry.location);
          map.setZoom(14);
          fetchCafesInBounds();
        } else {
          alert("City not found. Please try another location.");
        }
      });
    }

    function clearMarkers() {
      markers.forEach((marker) => marker.setMap(null));
      markers = [];
    }
  </script>

  <!-- Replace YOUR_API_KEY with your actual Google Maps API key -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=ADD_YOUR_OWN_API&libraries=places&callback=initMap"
    async
    defer
  ></script>
</body>
</html>
